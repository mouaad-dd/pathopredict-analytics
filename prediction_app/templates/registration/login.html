<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PathoPredict Analytics — Connexion</title>
    <!-- Typographie Inter & Icônes Bootstrap -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      /* Arrière-plan créatif sombre et immersif identique à l'app */
      body {
        font-family: "Inter", sans-serif;
        background: radial-gradient(
          circle at 50% 30%,
          #0f172a 0%,
          #090d16 100%
        );
        background-attachment: fixed;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      /* Conteneur de style verre dépoli (Glassmorphism) */
      .auth-card {
        background: rgba(30, 41, 59, 0.45);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 480px;
        padding: 40px;
        position: relative;
        overflow: hidden;
      }

      .auth-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: linear-gradient(90deg, #3b82f6, #06b6d4);
      }

      .logo-box {
        background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
        width: 42px;
        height: 42px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        margin: 0 auto 20px auto;
      }

      .brand-title {
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.04em;
        font-size: 1.4rem;
        text-align: center;
        margin-bottom: 30px;
      }
      .brand-title span {
        background: linear-gradient(to right, #3b82f6, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Personnalisation du formulaire Django */
      .auth-card form p {
        margin-bottom: 20px;
      }

      .auth-card form label {
        display: block;
        font-weight: 600;
        font-size: 0.9rem;
        color: #f1f5f9;
        margin-bottom: 8px;
      }

      /* Style des entrées de texte */
      .auth-card form input[type="text"],
      .auth-card form input[type="password"] {
        display: block;
        width: 100%;
        padding: 14px 20px;
        font-size: 0.95rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        background-color: rgba(15, 23, 42, 0.5);
        color: #ffffff;
        transition: all 0.25s ease;
      }

      .auth-card form input:focus {
        background-color: rgba(15, 23, 42, 0.8);
        border-color: #3b82f6;
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        outline: none;
        color: #ffffff;
      }

      /* Style des messages d'erreurs d'authentification */
      .errorlist {
        padding-left: 0;
        list-style: none;
        margin-bottom: 15px;
      }

      .errorlist li {
        color: #ef4444;
        font-size: 0.85rem;
        font-weight: 500;
        background-color: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        padding: 10px 15px;
        border-radius: 10px;
        margin-bottom: 8px;
      }

      /* Bouton d'action de connexion */
      .btn-auth {
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        color: #ffffff;
        font-weight: 600;
        padding: 14px;
        border-radius: 14px;
        border: none;
        width: 100%;
        transition: all 0.2s ease;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        margin-top: 15px;
      }

      .btn-auth:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(59, 130, 246, 0.55);
        color: #ffffff;
      }

      /* Liens de redirection de bas de page */
      .auth-footer {
        text-align: center;
        margin-top: 25px;
        font-size: 0.9rem;
        color: #94a3b8;
      }

      .auth-footer a {
        color: #38bdf8;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s ease;
      }

      .auth-footer a:hover {
        color: #06b6d4;
      }
    </style>
  </head>
  <body>
    <div class="auth-card shadow-lg">
      <!-- Logo -->
      <div class="logo-box">
        <i class="bi bi-diagram-3 text-white fs-4"></i>
      </div>

      <h2 class="brand-title">Connexion à <span>PathoPredict</span></h2>

      <!-- Formulaire Django -->
      <form method="post">
        {% csrf_token %} {{ form.as_p }}

        <button type="submit" class="btn btn-auth shadow-sm">
          Se connecter
        </button>
      </form>

      <!-- Redirection inscription -->
      <div
        class="auth-footer border-top pt-4"
        style="border-color: rgba(255, 255, 255, 0.08) !important"
      >
        Pas encore de compte ? <a href="{% url 'signup' %}">S'inscrire</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
