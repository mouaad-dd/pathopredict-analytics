<!doctype html>
<html lang="{{ lang }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PathoPredict Analytics — Sign In</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: radial-gradient(
          circle at 20% 30%,
          #0f172a 0%,
          #090d16 100%
        );
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e2e8f0;
      }
      .login-card {
        background: rgba(30, 41, 59, 0.45);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }
      .form-control {
        background-color: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #fff;
        padding: 12px 20px;
        border-radius: 12px;
      }
      .form-control:focus {
        background-color: rgba(15, 23, 42, 0.8);
        border-color: #3b82f6;
        color: #fff;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
      }
      .btn-submit {
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        border: none;
        padding: 14px;
        border-radius: 12px;
        font-weight: 600;
        color: white;
        width: 100%;
      }
      .lang-container a {
        text-decoration: none;
        font-size: 1.4rem;
        transition: transform 0.2s ease;
        display: inline-block;
      }
      .lang-container a:hover {
        transform: scale(1.2);
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <!-- Titre dynamique injecté par JavaScript -->
        <h3 class="fw-bold text-white m-0" id="loginTitle">Connexion</h3>
        <div class="lang-container d-flex gap-2">
          <a href="?lang=fr" title="Français">🇫🇷</a>
          <a href="?lang=en" title="English">🇺🇸</a>
        </div>
      </div>

      <form method="POST">
        {% csrf_token %} {% if form.errors %}
        <div
          class="alert alert-danger p-2 small border-0 bg-danger bg-opacity-10 text-danger mb-3"
          id="errorBlock"
        >
          Identification incorrecte.
        </div>
        {% endif %}

        <div class="mb-3">
          <label class="form-label small text-muted" id="labelUser"
            >Nom d'utilisateur</label
          >
          <input type="text" name="username" class="form-control" required />
        </div>
        <div class="mb-4">
          <label class="form-label small text-muted" id="labelPass"
            >Mot de passe</label
          >
          <input
            type="password"
            name="password"
            class="form-control"
            required
          />
        </div>
        <button type="submit" class="btn btn-submit mb-3" id="btnSubmit">
          Se connecter
        </button>
      </form>

      <div class="text-center small mt-2">
        <span class="text-muted" id="textNoAccount"
          >Pas encore de compte ?</span
        >
        <a
          href="{% url 'signup' %}"
          class="text-info text-decoration-none fw-medium"
          id="linkRegister"
          >S'inscrire</a
        >
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const urlParams = new URLSearchParams(window.location.search);
        const isEn = urlParams.get("lang") === "en";

        if (isEn) {
          document.getElementById("loginTitle").innerText = "Portal Sign In";
          document.getElementById("labelUser").innerText = "Username";
          document.getElementById("labelPass").innerText = "Password";
          document.getElementById("btnSubmit").innerText = "Sign In";
          document.getElementById("textNoAccount").innerText =
            "Don't have an account yet? ";
          document.getElementById("linkRegister").innerText = "Sign Up";

          const errorBlock = document.getElementById("errorBlock");
          if (errorBlock) {
            errorBlock.innerText = "Invalid credentials. Please try again.";
          }
        } else {
          document.getElementById("loginTitle").innerText =
            "Connexion à l'application";
          document.getElementById("labelUser").innerText = "Nom d'utilisateur";
          document.getElementById("labelPass").innerText = "Mot de passe";
          document.getElementById("btnSubmit").innerText = "Se connecter";
          document.getElementById("textNoAccount").innerText =
            "Pas encore de compte ? ";
          document.getElementById("linkRegister").innerText = "S'inscrire";
        }
      });
    </script>
  </body>
</html>
