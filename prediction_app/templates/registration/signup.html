<!doctype html>
<html lang="{{ lang }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ labels.title }}</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: radial-gradient(
          circle at 20% 30%,
          #0f172a 0%,
          #090d16 100%
        );
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e2e8f0;
      }
      .signup-card {
        background: rgba(30, 41, 59, 0.45);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }
      input[type="text"],
      input[type="password"] {
        background-color: rgba(15, 23, 42, 0.5) !important;
        border: 1px solid rgba(255, 255, 255, 0.12) !important;
        color: #fff !important;
        padding: 10px 15px;
        border-radius: 10px;
        width: 100%;
        display: block;
        margin-bottom: 15px;
      }
      .helptext,
      .form-text {
        display: block;
        font-size: 0.75rem;
        color: #64748b;
        margin-top: -10px;
        margin-bottom: 15px;
      }
      ul.errorlist {
        color: #f87171;
        font-size: 0.8rem;
        padding-left: 20px;
      }
      label {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 5px;
        display: block;
      }
      .btn-submit {
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        border: none;
        padding: 14px;
        border-radius: 12px;
        font-weight: 600;
        color: white;
        width: 100%;
        margin-top: 10px;
      }
      .lang-btn {
        opacity: 0.4;
        font-size: 1.4rem;
        text-decoration: none;
        transition: opacity 0.2s;
        display: inline-block;
      }
      .lang-btn:hover {
        opacity: 1;
      }
      .lang-active {
        opacity: 1;
        border-bottom: 2px solid #3b82f6;
      }
    </style>
  </head>
  <body>
    <div class="signup-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-white m-0">{{ labels.title }}</h3>
        <div class="d-flex gap-2">
          <a
            href="?lang=fr"
            class="lang-btn {% if lang == 'fr' %}lang-active{% endif %}"
            >🇫🇷</a
          >
          <a
            href="?lang=en"
            class="lang-btn {% if lang == 'en' %}lang-active{% endif %}"
            >🇺🇸</a
          >
        </div>
      </div>

      <form method="POST">
        {% csrf_token %} {{ form.as_p }}
        <button type="submit" class="btn btn-submit mb-3">
          {{ labels.btn }}
        </button>
      </form>

      <div class="text-center small mt-2">
        <span class="text-muted">{{ labels.already }}</span>
        <a
          href="{% url 'login' %}"
          class="text-info text-decoration-none fw-medium"
          >{{ labels.login }}</a
        >
      </div>
    </div>
  </body>
</html>
